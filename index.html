<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Lumo</title>
  <meta name="description" content="Smart insights. Lower bills. Brighter future.">
  <meta name="theme-color" content="#1F4A5C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Lumo">
  <meta name="mobile-web-app-capable" content="yes">
  <meta property="og:title" content="Lumo">
  <meta property="og:description" content="Smart insights. Lower bills. Brighter future.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://pilimit95.github.io/lumo/">
  <meta property="og:image" content="https://pilimit95.github.io/lumo/icon-512.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Lumo">
  <meta name="twitter:description" content="Smart insights. Lower bills. Brighter future.">
  <meta name="twitter:image" content="https://pilimit95.github.io/lumo/icon-512.png">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e8ecef;
      font-family: 'Poppins', sans-serif;
    }

    .phone {
      width: 390px;
      height: 844px;
      background: #f5f7f9;
      border-radius: 40px;
      box-shadow: 0 24px 80px rgba(31, 74, 92, 0.18);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .status-bar {
      height: 44px;
      padding: 12px 28px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      font-weight: 600;
      color: #1F4A5C;
    }

    .content {
      flex: 1;
      padding: 8px 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
    }

    .card-now {
      background: #fce8ee;
      border-radius: 20px;
      padding: 20px 22px;
      text-align: center;
      transition: background 0.3s ease;
    }

    .card-now.level-Low { background: #e6f7ed; }
    .card-now.level-Medium { background: #fef6e8; }
    .card-now.level-High { background: #fce8ee; }

    .card-now .label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #1F4A5C;
      opacity: 0.75;
      margin-bottom: 10px;
    }

    .card-now .price {
      font-size: 32px;
      font-weight: 700;
      color: #1F4A5C;
      line-height: 1.15;
      margin-bottom: 6px;
    }

    .card-now .price .level { color: #E85D75; }
    .card-now.level-Low .price .level { color: #3DBE6E; }
    .card-now.level-Medium .price .level { color: #F6B352; }
    .card-now.level-High .price .level { color: #E85D75; }

    .card-now .sub {
      font-size: 14px;
      font-weight: 500;
      color: #1F4A5C;
      opacity: 0.65;
    }

    .card-now.is-loading .price,
    .card-now.is-loading .sub { opacity: 0.45; }

    .arc-section {
      padding: 4px 0 8px;
    }

    .arc-section .arc-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      font-weight: 500;
      color: #1F4A5C;
      opacity: 0.5;
      padding: 0 4px 8px;
    }

    .arc-wrap {
      width: 100%;
      height: 120px;
      position: relative;
    }

    .arc-wrap svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }

    .arc-legend {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 4px;
      font-size: 10px;
      font-weight: 500;
      color: #1F4A5C;
      opacity: 0.55;
    }

    .arc-legend span {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .arc-legend i {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .arc-legend i.coral { background: #E85D75; }
    .arc-legend i.amber { background: #F6B352; }
    .arc-legend i.green { background: #3DBE6E; }

    .card-best {
      background: #EAF7F2;
      border: 1px solid rgba(29, 158, 117, 0.18);
      border-radius: 20px;
      padding: 18px 20px;
      text-align: center;
    }

    .card-best .row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .card-best .sun {
      width: 16px;
      height: 16px;
      color: #1D9E75;
    }

    .card-best .title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #0F6E56;
    }

    .card-best .window {
      font-size: 32px;
      font-weight: 700;
      color: #0F6E56;
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .card-best .rationale {
      font-size: 13px;
      font-weight: 500;
      color: #1F4A5C;
      opacity: 0.65;
    }

    .card-best.is-none .window { color: #6B6B66; font-size: 22px; }

    .footer {
      padding: 0 20px 36px;
      margin-top: auto;
    }

    .btn-remind {
      width: 100%;
      padding: 18px 24px;
      border: none;
      border-radius: 16px;
      background: #3DBE6E;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(61, 190, 110, 0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn-remind:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(61, 190, 110, 0.4);
    }

    .btn-remind:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="status-bar">
      <span id="clock">--:--</span>
      <span>●●●</span>
    </div>

    <div class="content">
      <section class="card-now is-loading" id="card-now">
        <p class="label">ENERGY COST NOW</p>
        <p class="price"><span class="level" id="level-label">…</span> · <span id="price-value">€—</span></p>
        <p class="sub" id="sub-text">Loading prices…</p>
      </section>

      <section class="arc-section">
        <div class="arc-labels">
          <span>Now</span>
          <span>Next 24h</span>
        </div>
        <div class="arc-wrap" id="arc-wrap"></div>
        <div class="arc-legend">
          <span><i class="green"></i> Low</span>
          <span><i class="amber"></i> Medium</span>
          <span><i class="coral"></i> High</span>
        </div>
      </section>

      <section class="card-best" id="card-best">
        <div class="row">
          <svg class="sun" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="12" cy="12" r="4" fill="currentColor"/>
            <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="12" y1="2" x2="12" y2="4"/>
              <line x1="12" y1="20" x2="12" y2="22"/>
              <line x1="2" y1="12" x2="4" y2="12"/>
              <line x1="20" y1="12" x2="22" y2="12"/>
              <line x1="4.9" y1="4.9" x2="6.3" y2="6.3"/>
              <line x1="17.7" y1="17.7" x2="19.1" y2="19.1"/>
              <line x1="4.9" y1="19.1" x2="6.3" y2="17.7"/>
              <line x1="17.7" y1="6.3" x2="19.1" y2="4.9"/>
            </g>
          </svg>
          <p class="title">BEST TIME TODAY</p>
        </div>
        <p class="window" id="best-window">—</p>
        <p class="rationale" id="best-rationale">Calculating the cheapest window…</p>
      </section>
    </div>

    <div class="footer">
      <button type="button" class="btn-remind">Remind me when it's cheap</button>
    </div>
  </div>

  <script>
    (function () {
      function getReeUrl() {
        const today = formatDate(madridNow());
        return 'https://apidatos.ree.es/es/datos/mercados/precios-mercados-tiempo-real' +
               '?start_date=' + today + 'T00:00&end_date=' + today + 'T23:59' +
               '&time_trunc=hour&geo_limit=peninsular&geo_ids=8741';
      }
      const TZ = 'Europe/Madrid';
      const COLORS = { High: '#E85D75', Medium: '#F6B352', Low: '#3DBE6E' };
      const PATH_LEN = 1000;
      const HOUR_LEN = PATH_LEN / 24;

      const cardNow = document.getElementById('card-now');
      const levelLabel = document.getElementById('level-label');
      const priceValue = document.getElementById('price-value');
      const subText = document.getElementById('sub-text');
      const arcWrap = document.getElementById('arc-wrap');
      const cardBest = document.getElementById('card-best');
      const bestWindow = document.getElementById('best-window');
      const bestRationale = document.getElementById('best-rationale');
      const clockEl = document.getElementById('clock');

      function madridNow() {
        return new Date();
      }

      function formatDate(d) {
        return new Intl.DateTimeFormat('en-CA', { timeZone: TZ }).format(d);
      }

      function pad2(n) {
        return String(n).padStart(2, '0');
      }

      function formatHHMM(d) {
        return new Intl.DateTimeFormat('es-ES', { timeZone: TZ, hour: '2-digit', minute: '2-digit', hour12: false }).format(d);
      }

      function formatEuro(price) {
        return '€' + price.toFixed(2);
      }

      function parsePrice(raw) {
        if (raw == null || raw === '') return null;
        let n = typeof raw === 'string' ? parseFloat(raw.replace(',', '.')) : Number(raw);
        if (Number.isNaN(n)) return null;
        if (n > 5) n = n / 1000;
        return n;
      }

      function parseHourLabel(hora) {
        if (hora == null) return null;
        if (typeof hora === 'number') return hora;
        const s = String(hora);
        const m = s.match(/(\d{1,2})/);
        return m ? parseInt(m[1], 10) : null;
      }

      function parseDayLabel(dia) {
        if (!dia) return null;
        const s = String(dia);
        if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0, 10);
        const m = s.match(/(\d{2})\/(\d{2})\/(\d{4})/);
        if (m) return m[3] + '-' + m[2] + '-' + m[1];
        return null;
      }

      function slotKey(dayKey, hour) {
        return dayKey + '|' + hour;
      }

      function addSlot(map, dayKey, hour, price) {
        const p = parsePrice(price);
        if (p == null || hour == null || hour < 0 || hour > 23 || !dayKey) return;
        map.set(slotKey(dayKey, hour), { dayKey, hour, price: p });
      }

      function normalizePrices(json) {
        const map = new Map();

        function ingestItem(item) {
          if (!item || typeof item !== 'object') return;
          const price = item.price ?? item.PCB ?? item.pcb ?? item.value ?? item.precio;
          let hour = item.hour ?? item.hora;
          if (hour == null) hour = parseHourLabel(item.Hora);
          let dayKey = item.date ?? item.day ?? item.Dia;
          if (!dayKey && item.datetime) {
            const dt = new Date(item.datetime);
            dayKey = formatDate(dt);
            if (hour == null) {
              hour = parseInt(
                new Intl.DateTimeFormat('es-ES', { timeZone: TZ, hour: 'numeric', hour12: false }).format(dt),
                10
              );
            }
          }
          if (!dayKey && item.time) {
            const dt = new Date(item.time);
            dayKey = formatDate(dt);
            if (hour == null) {
              hour = parseInt(
                new Intl.DateTimeFormat('es-ES', { timeZone: TZ, hour: 'numeric', hour12: false }).format(dt),
                10
              );
            }
          }
          dayKey = parseDayLabel(dayKey) || dayKey;
          if (dayKey && hour != null) addSlot(map, dayKey, hour, price);
        }

        if (Array.isArray(json)) {
          json.forEach(ingestItem);
        } else if (json && typeof json === 'object') {
          if (json.PVPC && Array.isArray(json.PVPC)) {
            json.PVPC.forEach(function (row) {
              addSlot(map, parseDayLabel(row.Dia), parseHourLabel(row.Hora), row.PCB);
            });
          }

          if (json.included && Array.isArray(json.included)) {
            json.included.forEach(function (inc) {
              const values = inc.attributes && inc.attributes.values;
              if (!Array.isArray(values)) return;
              values.forEach(function (v) {
                const dt = new Date(v.datetime);
                const madridHour = parseInt(
                  new Intl.DateTimeFormat('es-ES', { timeZone: TZ, hour: 'numeric', hour12: false }).format(dt),
                  10
                );
                addSlot(map, formatDate(dt), madridHour, v.value);
              });
            });
          }

          if (json.day && json.data && typeof json.data === 'object' && !Array.isArray(json.data)) {
            Object.keys(json.data).forEach(function (h) {
              addSlot(map, json.day, parseInt(h, 10), json.data[h]);
            });
          }

          const todayKey = formatDate(madridNow());
          const tomorrowKey = formatDate(new Date(madridNow().getTime() + 86400000));

          ['today', 'tomorrow', 'prices', 'values'].forEach(function (key) {
            const val = json[key];
            if (Array.isArray(val)) {
              val.forEach(ingestItem);
            } else if (val && typeof val === 'object' && !Array.isArray(val)) {
              const dayKey = key === 'tomorrow' ? tomorrowKey : (val.day || todayKey);
              Object.keys(val).forEach(function (h) {
                if (/^\d+$/.test(h)) addSlot(map, dayKey, parseInt(h, 10), val[h]);
              });
            }
          });

          if (json.data && typeof json.data === 'object') {
            if (json.data.data && typeof json.data.data === 'object') {
              const dayKey = json.data.day || json.day || todayKey;
              Object.keys(json.data.data).forEach(function (h) {
                if (/^\d+$/.test(h)) addSlot(map, dayKey, parseInt(h, 10), json.data.data[h]);
              });
            } else if (Array.isArray(json.data)) {
              json.data.forEach(ingestItem);
            }
          }
        }

        return Array.from(map.values()).sort(function (a, b) {
          if (a.dayKey !== b.dayKey) return a.dayKey.localeCompare(b.dayKey);
          return a.hour - b.hour;
        });
      }

      function getSlot(slots, dayKey, hour) {
        return slots.find(function (s) { return s.dayKey === dayKey && s.hour === hour; });
      }

      function dailyAverage(slots, dayKey) {
        const daySlots = slots.filter(function (s) { return s.dayKey === dayKey; });
        if (!daySlots.length) return null;
        const sum = daySlots.reduce(function (acc, s) { return acc + s.price; }, 0);
        return sum / daySlots.length;
      }

      function getLevel(price, avg) {
        if (price < avg) return 'Low';
        if (price > avg) return 'High';
        return 'Medium';
      }

      function buildTimeline24(slots, avg) {
        const now = madridNow();
        const timeline = [];
        for (let i = 0; i < 24; i++) {
          const t = new Date(now.getTime() + i * 3600000);
          const dayKey = formatDate(t);
          const hour = parseInt(
            new Intl.DateTimeFormat('es-ES', { timeZone: TZ, hour: 'numeric', hour12: false }).format(t),
            10
          );
          const slot = getSlot(slots, dayKey, hour);
          const price = slot ? slot.price : avg;
          timeline.push({
            offset: i,
            time: t,
            dayKey: dayKey,
            hour: hour,
            price: price,
            level: getLevel(price, avg)
          });
        }
        return timeline;
      }

      function guideText(level) {
        if (level === 'Low') return 'Good time to use energy';
        if (level === 'High') return 'Better to wait';
        return 'Cheaper later';
      }

      function findBestWindow(timeline) {
        // Longest consecutive Low stretch within the next 24h, ignoring the
        // current hour so we always look ahead to a future window.
        let best = null;
        let i = 1;
        while (i < timeline.length) {
          if (timeline[i].level !== 'Low') { i++; continue; }
          let j = i;
          let sum = 0;
          while (j < timeline.length && timeline[j].level === 'Low') {
            sum += timeline[j].price;
            j++;
          }
          const candidate = {
            start: timeline[i].time,
            end: j < timeline.length ? timeline[j].time : new Date(timeline[timeline.length - 1].time.getTime() + 3600000),
            hours: j - i,
            avgPrice: sum / (j - i)
          };
          if (!best || candidate.hours > best.hours) best = candidate;
          i = j;
        }
        return best;
      }

      function rationaleFor(win) {
        if (!win) return 'No clearly cheap hours today';
        const startHour = parseInt(
          new Intl.DateTimeFormat('es-ES', { timeZone: TZ, hour: 'numeric', hour12: false }).format(win.start),
          10
        );
        if (startHour >= 10 && startHour <= 18) return 'Cheapest when the sun is out';
        if (startHour >= 22 || startHour <= 5) return 'Cheapest while demand is low';
        return 'Cheapest hours today';
      }

      function renderArc(timeline) {
        const nowLevel = timeline[0].level;
        const nowColor = COLORS[nowLevel];
        let offset = 0;
        let segmentsHtml = '';
        let i = 0;
        while (i < timeline.length) {
          const level = timeline[i].level;
          let j = i + 1;
          while (j < timeline.length && timeline[j].level === level) j++;
          const len = (j - i) * HOUR_LEN;
          const cap = i === 0 ? ' stroke-linecap="round"' : '';
          const capEnd = j === timeline.length ? ' stroke-linecap="round"' : '';
          segmentsHtml +=
            '<use href="#arc24" stroke="' + COLORS[level] + '" stroke-width="12"' + cap + capEnd +
            ' pathLength="1000" stroke-dasharray="' + len + ' ' + (PATH_LEN - len) + '" stroke-dashoffset="-' + offset + '"/>';
          offset += len;
          i = j;
        }

        const midIdx = Math.min(12, timeline.length - 1);
        const endLabel = formatHHMM(timeline[timeline.length - 1].time);

        arcWrap.innerHTML =
          '<svg viewBox="0 0 350 110" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Energy price for the next 24 hours">' +
            '<defs><path id="arc24" pathLength="1000" d="M 24 82 Q 175 12 326 82"/></defs>' +
            '<use href="#arc24" stroke="rgba(31,74,92,0.07)" stroke-width="16" stroke-linecap="round"/>' +
            segmentsHtml +
            '<text x="24" y="104" fill="#1F4A5C" fill-opacity="0.42" font-family="Poppins, sans-serif" font-size="9" font-weight="500">Now</text>' +
            '<text x="310" y="104" fill="#1F4A5C" fill-opacity="0.42" font-family="Poppins, sans-serif" font-size="9" font-weight="500">' + endLabel + '</text>' +
            '<circle id="arc-now-dot" cx="24" cy="82" r="9" fill="#fff" stroke="' + nowColor + '" stroke-width="4"/>' +
            '<circle cx="24" cy="82" r="4" fill="' + nowColor + '"/>' +
          '</svg>';
      }

      function snapToHour(d) {
        const hourStr = new Intl.DateTimeFormat('es-ES', { timeZone: TZ, hour: '2-digit', hour12: false }).format(d);
        return hourStr + ':00';
      }

      function renderBest(win) {
        if (!win) {
          cardBest.classList.add('is-none');
          bestWindow.textContent = 'No cheap window today';
          bestRationale.textContent = 'Prices are pretty even all day';
          return;
        }
        cardBest.classList.remove('is-none');
        bestWindow.textContent = snapToHour(win.start) + ' to ' + snapToHour(win.end);
        bestRationale.textContent = rationaleFor(win);
      }

      function updateClock() {
        clockEl.textContent = formatHHMM(madridNow());
      }

      function renderUI(slots) {
        const now = madridNow();
        const todayKey = formatDate(now);
        const avg = dailyAverage(slots, todayKey);
        if (avg == null) throw new Error('No data for today');

        const currentHour = parseInt(
          new Intl.DateTimeFormat('es-ES', { timeZone: TZ, hour: 'numeric', hour12: false }).format(now),
          10
        );
        const currentSlot = getSlot(slots, todayKey, currentHour);
        const currentPrice = currentSlot ? currentSlot.price : avg;
        const currentLevel = getLevel(currentPrice, avg);

        const timeline = buildTimeline24(slots, avg);
        const bestWin = findBestWindow(timeline);

        cardNow.classList.remove('is-loading');
        cardNow.className = 'card-now level-' + currentLevel;
        levelLabel.textContent = currentLevel;
        priceValue.textContent = formatEuro(currentPrice);
        subText.textContent = guideText(currentLevel);

        renderArc(timeline);
        renderBest(bestWin);
      }

      function showError(msg) {
        cardNow.classList.remove('is-loading');
        cardNow.className = 'card-now';
        levelLabel.textContent = '—';
        priceValue.textContent = '€—';
        subText.textContent = "Couldn't load prices";
      }

      function buildFallbackSlots() {
        const todayKey = formatDate(madridNow());
        const prices = [
          0.128, 0.121, 0.115, 0.110, 0.108, 0.112,
          0.135, 0.158, 0.162, 0.142, 0.118, 0.092,
          0.072, 0.065, 0.061, 0.058, 0.063, 0.108,
          0.165, 0.185, 0.192, 0.178, 0.151, 0.134
        ];
        return prices.map(function (p, h) {
          return { dayKey: todayKey, hour: h, price: p };
        });
      }

      async function loadPrices() {
        updateClock();
        try {
          const res = await fetch(getReeUrl());
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const json = await res.json();
          const slots = normalizePrices(json);
          if (!slots.length) throw new Error('empty response');
          renderUI(slots);
        } catch (err) {
          console.warn('API failed, using demo data:', err.message);
          renderUI(buildFallbackSlots());
        }
      }

      loadPrices();
      setInterval(updateClock, 60000);
    })();

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function (err) {
          console.warn('SW registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
